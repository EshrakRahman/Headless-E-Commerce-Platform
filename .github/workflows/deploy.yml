name: Deploy E-commerce API

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This environment variable clears the Node.js 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            
            # Start the agent and add your GitHub key so 'git pull' has permission
            eval "$(ssh-agent -s)"
            ssh-add ~/.ssh/github_actions
            
            # Now the server can successfully talk to GitHub[cite: 1]
            git pull origin main
            
            # Standard Laravel optimization commands[cite: 1]
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan optimize
